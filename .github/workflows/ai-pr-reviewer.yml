name: Autonomous Master Agent Review

on:
  pull_request:
    types: [opened, synchronize] # Runs on new PRs and when you push new commits

permissions:
  pull-requests: write # Required to post comments on the PR
  contents: read

jobs:
  fetch-review-history:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Fetch recent manual PR review history (standalone)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_NAME: ${{ github.repository }}
          REVIEW_HISTORY_DAYS: "90"
          MAX_REVIEW_HISTORY_PRS: "80"
          MAX_REVIEW_HISTORY_COMMENTS: "120"
          MAX_REVIEW_HISTORY_CHARS: "14000"
          EXCLUDED_REVIEW_AUTHORS: "github-actions[bot]"
          RUN_MODE: "fetch_review_history"
          IGNORE_CACHED_REVIEW_HISTORY: "true"
          REVIEW_HISTORY_OUTPUT_FILE: "recent_pr_comments.txt"
          REVIEW_HISTORY_METADATA_FILE: "review_history_meta.json"
        run: python .github/scripts/run_agent.py

      - name: Upload review history artifact
        uses: actions/upload-artifact@v4
        with:
          name: review-history-context
          path: |
            recent_pr_comments.txt
            review_history_meta.json
          if-no-files-found: error

  ai-code-review:
    needs: fetch-review-history
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches full history so we can generate an accurate diff

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Generate Code Diff
        run: |
          # Compares the PR branch against the target branch (e.g., main)
          git fetch origin ${{ github.base_ref }}
          # ONLY include the app folder and gradle files in the diff!
          git diff origin/${{ github.base_ref }}...HEAD -- app/ build.gradle.kts build.gradle settings.gradle.kts > pr_diff.patch

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Run unit tests and generate coverage report (non-blocking)
        run: |
          ./gradlew :app:testDebugUnitTest :app:jacocoTestReport --console=plain || true

      - name: Print per-file coverage summary
        run: python .github/scripts/check_coverage.py || true

      - name: Collect Android lint context (non-blocking)
        run: |
          ./gradlew :app:lintDebug --console=plain > lint_output.txt 2>&1 || true

      - name: Download review history artifact
        uses: actions/download-artifact@v4
        with:
          name: review-history-context
          path: .

      - name: Run AI Master Reviewer
        env:
          # You will need to add your API key to GitHub Secrets
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO_NAME: ${{ github.repository }}
          RUN_TEST_COVERAGE: "true"
          REVIEW_HISTORY_DAYS: "90"
          MAX_REVIEW_HISTORY_PRS: "80"
          MAX_REVIEW_HISTORY_COMMENTS: "120"
          MAX_REVIEW_HISTORY_CHARS: "14000"
          EXCLUDED_REVIEW_AUTHORS: "github-actions[bot]"
        run: python .github/scripts/run_agent.py